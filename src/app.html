<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover is required so 100dvh/safe-area-inset work under
		     iOS Safari's dynamic toolbar (see SPEC §4). -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#000000" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<!-- iOS standalone PWA: launches full-screen with a translucent status bar
		     (apple-mobile-web-app-title is injected per-instance in +page.svelte). -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
